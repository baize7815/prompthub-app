kind = "web"
previewPath = "/"
title = "PromptHub - 提示词管理"
version = "1.0.0"
id = "artifacts/prompthub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24244

[services.development]
run = "pnpm --filter @workspace/prompthub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompthub", "run", "build" ]
publicDir = "artifacts/prompthub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24244"
BASE_PATH = "/"
